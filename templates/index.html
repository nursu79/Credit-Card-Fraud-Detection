<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection System</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--background);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        label {
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
        }

        .counter {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-main);
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            resize: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
        }

        textarea::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #result-container {
            display: none;
            margin-top: 30px;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            animation: slideUp 0.4s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .result-success .status-icon {
            color: var(--success);
        }

        .result-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .result-danger .status-icon {
            color: var(--danger);
        }

        .status-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .result-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .result-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .error-message {
            display: none;
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.1);
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Secure Transaction</h1>
        <p class="subtitle">Advanced predictive modeling for credit card fraud detection</p>

        <form id="prediction-form">
            <div class="input-group">
                <label for="input-data">
                    Transaction Features (30 expected)
                    <span class="counter" id="value-counter">0 / 30 values</span>
                </label>
                <textarea 
                    id="input-data" 
                    name="input_data" 
                    placeholder="Enter 30 numerical values separated by spaces or commas...&#10;Example: 26931 -22.5616 13.2089 -24.6438 ... 99.99"
                    required
                ></textarea>
                <div id="error-alert" class="error-message"></div>
            </div>

            <button type="submit" id="submit-btn">
                <span>Analyze Transaction</span>
                <div class="loading-spinner" id="spinner"></div>
            </button>
        </form>

        <div id="result-container">
            <div class="status-icon" id="result-icon">🛡️</div>
            <div class="result-title" id="result-title">Analysis Complete</div>
            <div class="result-desc" id="result-desc">Processing results...</div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('input-data');
        const counter = document.getElementById('value-counter');
        const form = document.getElementById('prediction-form');
        const submitBtn = document.getElementById('submit-btn');
        const spinner = document.getElementById('spinner');
        const btnText = submitBtn.querySelector('span');
        const resultContainer = document.getElementById('result-container');
        const errorAlert = document.getElementById('error-alert');

        // Update counter as user types
        textarea.addEventListener('input', function() {
            const text = this.value.trim().replace(/,/g, ' ');
            const values = text ? text.split(/\s+/) : [];
            const count = values.length;
            
            counter.textContent = `${count} / 30 values`;
            
            if (count > 0 && count !== 30) {
                counter.style.color = '#fca5a5'; // Red-ish
            } else if (count === 30) {
                counter.style.color = '#34d399'; // Green-ish
            } else {
                counter.style.color = '#94a3b8'; // Default muted
            }
        });

        // Handle form submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Reset UI states
            errorAlert.style.display = 'none';
            resultContainer.style.display = 'none';
            btnText.textContent = 'Processing...';
            spinner.style.display = 'block';
            submitBtn.disabled = true;

            const formData = new FormData(this);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'An unknown error occurred');
                }

                // Show success result
                resultContainer.className = result.prediction === 1 ? 'result-danger' : 'result-success';
                document.getElementById('result-icon').textContent = result.prediction === 1 ? '⚠️' : '✅';
                document.getElementById('result-title').textContent = result.label;
                document.getElementById('result-title').style.color = result.prediction === 1 ? 'var(--danger)' : 'var(--success)';
                document.getElementById('result-desc').textContent = result.prediction === 1 
                    ? 'This transaction exhibits patterns strongly correlated with known fraudulent activity.' 
                    : 'This transaction follows normal patterns and is considered secure.';
                
                resultContainer.style.display = 'block';

            } catch (error) {
                // Show error message
                errorAlert.textContent = error.message;
                errorAlert.style.display = 'block';
            } finally {
                // Restore button state
                btnText.textContent = 'Analyze Transaction';
                spinner.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
